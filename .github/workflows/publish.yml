name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v0.1.1, v1.0.0
  release:
    types: [published]  # Also trigger on GitHub Release (creates tag if needed)

permissions:
  id-token: write  # Required for trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pysaka
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed - uses trusted publishing via OIDC
        with:
          # This workflow fires on BOTH the version-tag push and the GitHub
          # Release publish for the same version. skip-existing makes the second
          # run a graceful no-op instead of failing on a duplicate upload.
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    # Only on the tag push. Creating a Release fires a `release: published`
    # event that re-runs this workflow; guarding to the push event stops this
    # job from looping (and PyPI publish above is idempotent via skip-existing).
    if: github.event_name == 'push'
    permissions:
      contents: write  # required to create a GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          # Pull just this version's section out of CHANGELOG.md for the notes
          # (from the "## [X.Y.Z]" heading up to the next "## [" heading).
          NOTES=$(awk -v tag="## [$VERSION]" 'index($0, tag){f=1; next} /^## \[/{if(f) exit} f' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md) and https://pypi.org/project/pysaka/${VERSION}/"
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "pysaka $VERSION" \
            --verify-tag \
            --notes "$NOTES"
